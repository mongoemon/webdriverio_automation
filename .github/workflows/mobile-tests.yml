name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 2 * * 1'   # every Monday 02:00 UTC
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to test'
        required: true
        default: android
        type: choice
        options: [android, ios, both]

env:
  NODE_VERSION: '20'

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Lint + Type-check (fast, no device, runs on every event)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Android tests
#   Runs on: push, PR, schedule, or workflow_dispatch with platform=android|both
# ─────────────────────────────────────────────────────────────────────────────
  android:
    name: Android Tests (API 34)
    runs-on: macos-latest
    needs: lint-typecheck
    if: >-
      github.event_name != 'workflow_dispatch' ||
      inputs.platform == 'android' ||
      inputs.platform == 'both'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download APK
        run: |
          mkdir -p apps/android
          curl -fsSL -o apps/android/mda-2.2.0-25.apk \
            "https://github.com/saucelabs/my-demo-app-android/releases/download/v2.2.0/mda-2.2.0-25.apk"

      - name: Install Appium + UiAutomator2 driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      # android-emulator-runner keeps the emulator alive for the duration of `script:`
      # API 34 (Android 14) is the highest stable level supported by the runner action.
      # Tests run with generous timeouts because CI emulators are slower than local ones.
      - name: Run tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          heap-size: '512M'
          emulator-options: >-
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -camera-back none
          disable-animations: true
          script: npm run test:android
        env:
          ANDROID_APP_PATH: ./apps/android/mda-2.2.0-25.apk
          ANDROID_DEVICE_NAME: emulator-5554
          ANDROID_PLATFORM_VERSION: '14.0'
          ANDROID_APP_PACKAGE: com.saucelabs.mydemoapp.android
          ANDROID_APP_ACTIVITY: com.saucelabs.mydemoapp.android.view.activities.SplashActivity
          APPIUM_HOST: 127.0.0.1
          APPIUM_PORT: 4723
          EXPLICIT_TIMEOUT: '30000'

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-allure-results
          path: reports/allure-results/
          retention-days: 30

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-failure-screenshots
          path: reports/screenshots/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — iOS tests
#   Runs only via workflow_dispatch with platform=ios|both (macOS-only capability)
# ─────────────────────────────────────────────────────────────────────────────
  ios:
    name: iOS Tests
    runs-on: macos-latest
    needs: lint-typecheck
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (inputs.platform == 'ios' || inputs.platform == 'both')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The iOS simulator requires a .app bundle (not .ipa).
      # Update the URL below to the release that matches your IPA version.
      - name: Download iOS .app bundle
        run: |
          mkdir -p apps/ios
          curl -fsSL -o apps/ios/app.zip \
            "https://github.com/saucelabs/my-demo-app-rn/releases/download/v1.3.0/iOS-Simulator-MyRNDemoApp.1.3.0-162.zip"
          unzip -o apps/ios/app.zip -d apps/ios/
          ls apps/ios/

      - name: Install Appium + XCUITest driver
        run: |
          npm install -g appium
          appium driver install xcuitest

      - name: Boot iOS Simulator
        run: |
          xcrun simctl boot "iPhone 15" || true
          open -a Simulator --background
          xcrun simctl bootstatus "iPhone 15" -b

      - name: Run tests
        run: npm run test:ios
        env:
          IOS_APP_PATH: ./apps/ios/MyRNDemoApp.app
          IOS_DEVICE_NAME: 'iPhone 15'
          IOS_PLATFORM_VERSION: '17.0'
          IOS_BUNDLE_ID: com.saucelabs.mydemoapp.rn
          APPIUM_HOST: 127.0.0.1
          APPIUM_PORT: 4723
          EXPLICIT_TIMEOUT: '30000'

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-allure-results
          path: reports/allure-results/
          retention-days: 30

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-failure-screenshots
          path: reports/screenshots/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — Publish Allure report to GitHub Pages
#   Runs after Android tests complete (pass or fail) on pushes to master only.
#   Requires GitHub Pages to be enabled: Settings → Pages → Source: gh-pages branch
# ─────────────────────────────────────────────────────────────────────────────
  publish-report:
    name: Publish Report → GitHub Pages
    runs-on: ubuntu-latest
    needs: android
    if: always() && github.ref == 'refs/heads/master' && needs.android.result != 'skipped'

    steps:
      - uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: android-allure-results
          path: allure-results/
        continue-on-error: true

      - name: Load previous Allure history from gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history
          publish_branch: gh-pages
